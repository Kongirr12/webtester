<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบโรงเรียนและบริหารงานสำนักงาน | School Portal & Office HUB</title>
    
    <!-- Google Fonts: Inter & Sarabun for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons for Clean Modern Styling -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase JavaScript Client Library via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <i data-lucide="school"></i>
                </div>
                <div class="logo-text">SchoolPortal</div>
            </div>
            
            <nav class="sidebar-menu-wrapper">
                <ul class="sidebar-menu">
                    <!-- Public Homepage -->
                    <li class="menu-item active" data-target="homepage">
                        <a href="#homepage">
                            <i data-lucide="home"></i>
                            <span>หน้าแรกโรงเรียน</span>
                        </a>
                    </li>
                    
                    <!-- Office Backend Dashboard -->
                    <li class="menu-item" data-target="dashboard" data-roles="Admin,Teacher">
                        <a href="#dashboard">
                            <i data-lucide="layout-dashboard"></i>
                            <span>หลังบ้านสำนักงาน</span>
                        </a>
                    </li>
                    <li class="menu-item" data-target="students" data-roles="Admin,Teacher">
                        <a href="#students">
                            <i data-lucide="users"></i>
                            <span>จัดการนักเรียน</span>
                        </a>
                    </li>
                    <li class="menu-item" data-target="teachers" data-roles="Admin">
                        <a href="#teachers">
                            <i data-lucide="award"></i>
                            <span>จัดการคุณครู</span>
                        </a>
                    </li>
                    <li class="menu-item" data-target="classes" data-roles="Admin">
                        <a href="#classes">
                            <i data-lucide="book-open"></i>
                            <span>ชั้นเรียน & รายวิชา</span>
                        </a>
                    </li>
                    <li class="menu-item" data-target="attendance" data-roles="Admin,Teacher">
                        <a href="#attendance">
                            <i data-lucide="calendar-check-2"></i>
                            <span>เช็คชื่อเข้าเรียน</span>
                        </a>
                    </li>
                    <li class="menu-item" data-target="grades" data-roles="Admin,Teacher,Student">
                        <a href="#grades">
                            <i data-lucide="file-spreadsheet"></i>
                            <span>คะแนน & ผลการเรียน</span>
                        </a>
                    </li>
                    
                    <!-- New Subsystems in Office Backend -->
                    <li class="menu-item" data-target="budgeting" data-roles="Admin,Teacher">
                        <a href="#budgeting">
                            <i data-lucide="wallet"></i>
                            <span>ระบบงบประมาณ</span>
                        </a>
                    </li>
                    <li class="menu-item" data-target="medialibrary" data-roles="Admin,Teacher,Student">
                        <a href="#medialibrary">
                            <i data-lucide="folder-git-branch"></i>
                            <span>คลังสื่อการเรียนรู้</span>
                        </a>
                    </li>
                    
                    <li class="menu-item" data-target="settings">
                        <a href="#settings">
                            <i data-lucide="settings"></i>
                            <span>ตั้งค่าการเชื่อมต่อ</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="db-status-badge" id="db-status-badge">
                    <span class="status-dot status-demo" id="db-status-dot"></span>
                    <span id="db-status-text">โหมดจำลอง (Local)</span>
                </div>
            </div>
        </aside>
        
        <!-- Main Content Panel Wrapper -->
        <main class="main-content">
            
            <!-- Top Header Navbar -->
            <header class="main-header">
                <!-- Search bar -->
                <div class="header-search">
                    <i data-lucide="search" style="width: 18px; height: 18px; color: var(--text-muted);"></i>
                    <input type="text" placeholder="ค้นหาข้อมูล..." id="global-search">
                </div>
                
                <!-- Navbar Actions -->
                <div class="header-actions">
                    <!-- Live CMS Toggle Switch (Admin Only) -->
                    <div id="cms-toggle-wrapper" style="display: none;">
                        <button class="cms-toggle-btn" id="cms-toggle-btn">
                            <i data-lucide="edit-3" style="width: 14px; height: 14px;"></i>
                            <span>เปิดโหมดแก้ไขสด</span>
                        </button>
                    </div>

                    <!-- Dynamic Role Switcher (Simulator) -->
                    <div class="role-selector">
                        <i data-lucide="user-cog" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
                        <select id="role-switcher" title="สลับบทบาทผู้ใช้ (เพื่อทดสอบหน้าจอ)">
                            <option value="Admin">ผู้ดูแลระบบ (Admin)</option>
                            <option value="Teacher">คุณครู (Teacher)</option>
                            <option value="Student">นักเรียน/ผู้ปกครอง (Student)</option>
                        </select>
                    </div>
                    
                    <!-- Dark/Light Theme Button -->
                    <button class="theme-toggle" id="theme-toggle" title="สลับโหมด มืด/สว่าง">
                        <i data-lucide="sun" id="theme-icon-sun"></i>
                        <i data-lucide="moon" id="theme-icon-moon" style="display: none;"></i>
                    </button>
                    
                    <!-- User Profile Avatar and Info -->
                    <div class="user-profile">
                        <div class="avatar" id="user-avatar">AD</div>
                        <div class="user-info">
                            <span class="user-name" id="user-display-name">ผู้ดูแลระบบ</span>
                            <span class="user-role" id="user-display-role">Administrator</span>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Dynamic Sub-view Container -->
            <div class="page-viewport" id="page-viewport">
                <!-- Inner pages will be dynamically rendered here by app.js -->
            </div>
            
        </main>
        
    </div>

    <!-- Generic Modal Dialog for CRUD Operations -->
    <div class="modal-backdrop" id="modal-backdrop" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">จัดการข้อมูล</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="modal-form">
                <div class="modal-body" id="modal-body">
                    <!-- Form fields will be loaded dynamically by app.js -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="modal-btn-cancel">ยกเลิก</button>
                    <button type="submit" class="btn btn-primary" id="modal-btn-submit">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script imports -->
    <script src="config.js"></script>
    <script src="supabase-db.js"></script>
    <script src="app.js"></script>
</body>
</html>
